name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Test Job (รันทุก trigger) ────────────────────────────────────────────
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linter
        working-directory: ./backend
        run: npm run lint

      - name: Run tests
        working-directory: ./backend
        run: npm test -- --coverage

  # ── Build & Deploy Job (รันเฉพาะ push เท่านั้น) ───────────────────────────
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Setup ────────────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create GCS key file
        env:
          GCP_ARTIFACT_REGISTRY_KEY: ${{ secrets.GCP_ARTIFACT_REGISTRY_KEY }}
        run: |
          echo "$GCP_ARTIFACT_REGISTRY_KEY" | base64 -d > gcs-key.json
          echo "GCS key file created"

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_ARTIFACT_REGISTRY_KEY }}

      # ── Build & Push Docker Image ─────────────────────────────────────────────

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            asia-southeast1-docker.pkg.dev/spheric-rhythm-473010-d7/pharventory-backend/pharventory:latest
            asia-southeast1-docker.pkg.dev/spheric-rhythm-473010-d7/pharventory-backend/pharventory:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      # ── Deploy to Cloud Run ───────────────────────────────────────────────────

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_ARTIFACT_REGISTRY_KEY }}

      - name: Deploy to Cloud Run
        run: |
          if [ "${{secrets.CLOUD_RUN_ALLOW_UNAUTHENTICATED}}" = "true" ]; then
          gcloud run deploy ${{secrets.CLOUD_RUN_SERVICE_NAME}} \
            --image asia-southeast1-docker.pkg.dev/spheric-rhythm-473010-d7/pharventory-backend/pharventory:latest \
            --platform managed \
            --region ${{secrets.CLOUD_RUN_REGION}} \
            --allow-unauthenticated \
            --port ${{secrets.CLOUD_RUN_PORT}} \
            --memory ${{secrets.CLOUD_RUN_MEMORY}} \
            --cpu ${{secrets.CLOUD_RUN_CPU}} \
            --max-instances ${{secrets.CLOUD_RUN_MAX_INSTANCES}} \
            --timeout ${{secrets.CLOUD_RUN_TIMEOUT}}
          else
          gcloud run deploy ${{secrets.CLOUD_RUN_SERVICE_NAME}} \
            --image asia-southeast1-docker.pkg.dev/spheric-rhythm-473010-d7/pharventory-backend/pharventory:latest \
            --platform managed \
            --region ${{secrets.CLOUD_RUN_REGION}} \
            --no-allow-unauthenticated \
            --port ${{secrets.CLOUD_RUN_PORT}} \
            --memory ${{secrets.CLOUD_RUN_MEMORY}} \
            --cpu ${{secrets.CLOUD_RUN_CPU}} \
            --max-instances ${{secrets.CLOUD_RUN_MAX_INSTANCES}} \
            --timeout ${{secrets.CLOUD_RUN_TIMEOUT}}
          fi
